<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>UniEv - Şifre Sıfırlama</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="/static/js/toast.js"></script>
    <style>
        .bg-uniev-teal {
            background-color: #0d6e6e;
        }
        .bg-uniev-teal:hover {
            background-color: #0a5a5a;
        }
        .navbar-gradient {
            background: linear-gradient(90deg, #0f766e 0%, #14b8a6 50%, #0f766e 100%);
            height: 3px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    <header class="w-full bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <a href="/">
                    <img alt="UniEv Logo" class="h-30 w-30 object-contain" src="/static/images/Logo.png" onerror="this.style.display='none'"/>
                </a>
            </div>
        </div>
        <div class="navbar-gradient"></div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
            <div class="text-center mb-8">
                <div class="text-5xl mb-4">🔐</div>
                <h1 class="text-3xl font-bold text-slate-900 mb-2">Şifre Sıfırlama</h1>
                <p class="text-slate-600">Yeni şifrenizi belirleyin</p>
            </div>

            <form id="resetPasswordForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2" for="newPassword">
                        Yeni Şifre
                    </label>
                    <input 
                        type="password" 
                        id="newPassword" 
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-teal-600 focus:border-teal-600 outline-none transition-all" 
                        placeholder="En az 8 karakter, 1 rakam"
                        required
                    />
                    <p class="text-xs text-slate-500 mt-1">Şifre en az 8 karakter ve bir rakam içermelidir</p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2" for="confirmPassword">
                        Yeni Şifre (Tekrar)
                    </label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-teal-600 focus:border-teal-600 outline-none transition-all" 
                        placeholder="Şifrenizi tekrar girin"
                        required
                    />
                </div>

                <button 
                    type="submit" 
                    class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-4 rounded-xl transition-all shadow-md"
                >
                    Şifreyi Güncelle
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/login" class="text-sm text-teal-600 hover:underline">
                    Giriş sayfasına dön
                </a>
            </div>
        </div>
    </main>

    <footer class="w-full px-6 py-6 bg-gradient-to-r from-teal-800 to-teal-700 mt-auto">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center text-xs text-white gap-4">
            <div>© 2026 UniEv - Öğrenciler için güvenli konut platformu</div>
            <div class="flex flex-wrap justify-center gap-4 md:gap-6">
                <a class="hover:text-teal-200 transition-colors" href="#">KVKK</a>
                <a class="hover:text-teal-200 transition-colors" href="#">Gizlilik</a>
                <a class="hover:text-teal-200 transition-colors" href="#">Kullanım Koşulları</a>
            </div>
        </div>
    </footer>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            showToast('Geçersiz sıfırlama bağlantısı', 'error');
            setTimeout(() => window.location.href = '/login', 2000);
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showToast('Şifreler eşleşmiyor', 'error');
                return;
            }
            
            // Validate password requirements
            if (newPassword.length < 8 || !/\d/.test(newPassword)) {
                showToast('Şifre en az 8 karakter ve bir rakam içermelidir', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        token: token,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showToast('✅ Şifreniz başarıyla güncellendi! Giriş sayfasına yönlendiriliyorsunuz...', 'success', 3000);
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    showToast(data.detail || 'Şifre güncellenemedi', 'error');
                }
            } catch (error) {
                showToast('Bir hata oluştu. Lütfen tekrar deneyin.', 'error');
            }
        });
    </script>
</body>
</html>
