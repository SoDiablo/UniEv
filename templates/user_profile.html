<!DOCTYPE html>
<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kullanıcı Profili | UniEv</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="/static/js/toast.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
.navbar-gradient {
    background: linear-gradient(90deg, #0f766e 0%, #14b8a6 50%, #0f766e 100%);
    height: 3px;
}
</style>
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
<header class="bg-white border-b border-slate-200 sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
<div class="flex items-center gap-2">
<a href="/">
<img alt="UniEv Logo" class="h-30 w-30 object-contain" src="/static/images/Logo.png" onerror="this.style.display='none'"/>
</a>
</div>
<nav class="flex items-center space-x-6 text-sm font-medium text-slate-600" id="mainNav">
<!-- Navigation will be dynamically populated -->
</nav>
</div>
<div class="navbar-gradient"></div>
</header>

<main class="flex-grow max-w-4xl mx-auto px-4 py-8 w-full">
<div id="profile-content" class="bg-white rounded-xl shadow-sm border border-slate-100 p-8">
<div class="text-center">
<div class="animate-spin rounded-full h-12 w-12 border-b-2 border-teal-700 mx-auto mb-4"></div>
<p class="text-slate-500">Profil yükleniyor...</p>
</div>
</div>
</main>

<footer class="mt-auto bg-gradient-to-r from-teal-800 to-teal-700 py-8 px-4 border-t border-teal-900">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-white">
<div>© 2026 UniEv - Öğrenciler için güvenli konut platformu</div>
<nav class="flex flex-wrap justify-center gap-4">
<a class="hover:text-teal-200 transition-colors" href="#">KVKK</a>
<a class="hover:text-teal-200 transition-colors" href="#">Gizlilik</a>
<a class="hover:text-teal-200 transition-colors" href="#">Çerez Politikası</a>
<a class="hover:text-teal-200 transition-colors" href="#">Kullanım Koşulları</a>
<a class="hover:text-teal-200 transition-colors" href="/help">Yardım</a>
</nav>
</div>
</footer>

<script>
// Check authentication
const token = localStorage.getItem('token');
const userStr = localStorage.getItem('user');
const user = userStr ? JSON.parse(userStr) : null;

// Dynamic navigation based on role
function setupNavigation() {
    const nav = document.getElementById('mainNav');
    const activeClass = 'text-teal-700 border-b-2 border-teal-700 pb-1';
    const normalClass = 'hover:text-slate-900';
    
    if (!user) {
        nav.innerHTML = `
            <a class="${normalClass}" href="/">Ana Sayfa</a>
            <a class="${normalClass}" href="/listings">İlanlar</a>
            <a class="${normalClass}" href="/help">Yardım</a>
            <a class="${normalClass}" href="/login">Giriş</a>
            <a class="${normalClass}" href="/register">Kayıt Ol</a>
        `;
        return;
    }
    
    if (user.role === 'LANDLORD') {
        nav.innerHTML = `
            <a class="${normalClass}" href="/">Ana Sayfa</a>
            <a class="${normalClass}" href="/listings">İlanlar</a>
            <a class="${normalClass}" href="/create-listing">İlan Oluştur</a>
            <a class="${normalClass}" href="/messages">Mesajlar</a>
            <a class="${normalClass}" href="/profile">Profil</a>
            <a class="${normalClass}" href="/help">Yardım</a>
            <a class="${normalClass}" href="#" onclick="logout()">Çıkış</a>
        `;
    } else if (user.role === 'ADMIN') {
        nav.innerHTML = `
            <a class="${normalClass}" href="/">Ana Sayfa</a>
            <a class="${normalClass}" href="/listings">İlanlar</a>
            <a class="${normalClass}" href="/admin">Admin Panel</a>
            <a class="${normalClass}" href="/messages">Mesajlar</a>
            <a class="${normalClass}" href="/profile">Profil</a>
            <a class="${normalClass}" href="/help">Yardım</a>
            <a class="${normalClass}" href="#" onclick="logout()">Çıkış</a>
        `;
    } else {
        // STUDENT
        nav.innerHTML = `
            <a class="${normalClass}" href="/">Ana Sayfa</a>
            <a class="${normalClass}" href="/listings">İlanlar</a>
            <a class="${normalClass}" href="/match">Eşleşme</a>
            <a class="${normalClass}" href="/messages">Mesajlar</a>
            <a class="${normalClass}" href="/profile">Profil</a>
            <a class="${normalClass}" href="/help">Yardım</a>
            <a class="${normalClass}" href="#" onclick="logout()">Çıkış</a>
        `;
    }
}

setupNavigation();

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/login';
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function startConversation(userId) {
    if (!token) {
        showToast('Mesaj göndermek için giriş yapmalısınız', 'warning');
        setTimeout(() => window.location.href = '/login', 1500);
        return;
    }
    window.location.href = `/messages?with=${userId}`;
}

async function loadUserProfile() {
    const userId = window.location.pathname.split('/').pop();
    const container = document.getElementById('profile-content');
    
    try {
        // Fetch user info
        const userResponse = await fetch(`/api/users/${userId}`);
        if (!userResponse.ok) {
            throw new Error('Kullanıcı bulunamadı');
        }
        const userData = await userResponse.json();
        
        // Fetch user profile
        let profileData = null;
        try {
            const profileResponse = await fetch(`/api/users/${userId}/profile`);
            if (profileResponse.ok) {
                profileData = await profileResponse.json();
            }
        } catch (e) {
            console.log('Profile not found, using defaults');
        }
        
        // Fetch ratings
        const ratingsResponse = await fetch(`/api/ratings/user/${userId}`);
        const ratingsData = ratingsResponse.ok ? await ratingsResponse.json() : { average_rating: 0, total_ratings: 0, ratings: [] };
        
        // Fetch user's listings (if landlord)
        let listingsData = [];
        if (userData.role === 'LANDLORD') {
            try {
                const listingsResponse = await fetch(`/api/listings?owner_id=${userId}`);
                if (listingsResponse.ok) {
                    const listingsJson = await listingsResponse.json();
                    listingsData = listingsJson.listings || [];
                }
            } catch (e) {
                console.log('Could not fetch listings');
            }
        }
        
        // Check if current user can rate
        let canRate = false;
        let myRatings = [];
        if (token && user && user.id !== userId) {
            try {
                const myRatingsResponse = await fetch(`/api/ratings/user/${userId}/my-ratings`, {
                    headers: {'Authorization': `Bearer ${token}`}
                });
                if (myRatingsResponse.ok) {
                    const myRatingsData = await myRatingsResponse.json();
                    canRate = myRatingsData.can_rate_more;
                    myRatings = myRatingsData.ratings;
                }
            } catch (e) {
                console.log('Could not fetch my ratings');
            }
        }
        
        // Render stars
        function renderStars(rating, size = 'text-xl') {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) {
                    stars += `<span class="${size} text-yellow-400">★</span>`;
                } else {
                    stars += `<span class="${size} text-gray-300">★</span>`;
                }
            }
            return stars;
        }
        
        // Render profile
        container.innerHTML = `
            <div class="text-center mb-8">
                <img src="${profileData?.photo_url || '/static/images/default-avatar.svg'}" 
                     alt="Profile Photo" 
                     class="w-32 h-32 rounded-full object-cover border-4 border-slate-100 mx-auto mb-4"
                     onerror="this.src='/static/images/default-avatar.svg'" />
                <h1 class="text-3xl font-bold text-slate-900 mb-2">${escapeHtml(userData.first_name)} ${escapeHtml(userData.last_name)}</h1>
                <p class="text-slate-600 mb-1">
                    ${userData.role === 'STUDENT' ? '🎓 Öğrenci' : userData.role === 'LANDLORD' ? '🏠 Ev Sahibi' : '👤 Kullanıcı'}
                </p>
                ${userData.email ? `<p class="text-sm text-slate-600 mb-1">📧 ${escapeHtml(userData.email)}</p>` : ''}
                ${userData.phone ? `<p class="text-sm text-slate-600 mb-3">📞 ${escapeHtml(userData.phone)}</p>` : ''}
                
                <!-- Rating Display -->
                <div class="flex items-center justify-center gap-2 mb-2">
                    ${renderStars(Math.round(ratingsData.average_rating))}
                    <span class="text-lg font-semibold text-slate-700">${ratingsData.average_rating.toFixed(1)}</span>
                    <span class="text-sm text-slate-500">(${ratingsData.total_ratings} değerlendirme)</span>
                </div>
                
                ${canRate ? `
                <button onclick="showRatingModal('${userId}')" class="text-sm text-teal-600 hover:text-teal-700 font-medium">
                    ⭐ Değerlendir (${2 - myRatings.length} hak kaldı)
                </button>
                ` : ''}
            </div>
            
            ${profileData?.bio ? `
            <div class="mb-6">
                <h2 class="text-xl font-semibold text-slate-900 mb-3">Hakkında</h2>
                <div class="bg-slate-50 rounded-lg p-4">
                    <p class="text-slate-700 leading-relaxed whitespace-pre-wrap">${escapeHtml(profileData.bio)}</p>
                </div>
            </div>
            ` : ''}
            
            ${userData.role === 'LANDLORD' && listingsData.length > 0 ? `
            <div class="mb-6">
                <h2 class="text-xl font-semibold text-slate-900 mb-3">İlanlar (${listingsData.length})</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${listingsData.map(listing => `
                        <a href="/listing/${listing.id}" class="bg-white border border-slate-200 rounded-lg p-4 hover:shadow-md transition-shadow">
                            <h3 class="font-semibold text-slate-900 mb-2">${escapeHtml(listing.title)}</h3>
                            <p class="text-sm text-slate-600 mb-2 line-clamp-2">${escapeHtml(listing.description)}</p>
                            <div class="flex justify-between items-center">
                                <span class="text-lg font-bold text-teal-700">₺${listing.price.toLocaleString('tr-TR')}/ay</span>
                                <span class="text-xs ${listing.fraud_score > 50 ? 'text-red-600' : 'text-green-600'}">
                                    Risk: ${listing.fraud_score || 'N/A'}
                                </span>
                            </div>
                        </a>
                    `).join('')}
                </div>
            </div>
            ` : ''}
            
            ${profileData ? `
            <div class="mb-6">
                <h2 class="text-xl font-semibold text-slate-900 mb-3">Tercihler</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${profileData.budget_min || profileData.budget_max ? `
                    <div class="bg-slate-50 rounded-lg p-4">
                        <p class="text-sm text-slate-600 mb-1">Bütçe</p>
                        <p class="font-semibold text-slate-900">
                            ${profileData.budget_min ? `₺${profileData.budget_min.toLocaleString('tr-TR')}` : '?'} - 
                            ${profileData.budget_max ? `₺${profileData.budget_max.toLocaleString('tr-TR')}` : '?'}
                        </p>
                    </div>
                    ` : ''}
                    
                    ${profileData.sleep_schedule ? `
                    <div class="bg-slate-50 rounded-lg p-4">
                        <p class="text-sm text-slate-600 mb-1">Uyku Düzeni</p>
                        <p class="font-semibold text-slate-900">
                            ${profileData.sleep_schedule === 'EARLY_BIRD' ? 'Erken kalkan' : 
                              profileData.sleep_schedule === 'NIGHT_OWL' ? 'Gece kuşu' : 'Değişken'}
                        </p>
                    </div>
                    ` : ''}
                    
                    ${profileData.cleanliness ? `
                    <div class="bg-slate-50 rounded-lg p-4">
                        <p class="text-sm text-slate-600 mb-1">Temizlik Hassasiyeti</p>
                        <p class="font-semibold text-slate-900">
                            ${profileData.cleanliness === 'HIGH' ? 'Yüksek' : 
                              profileData.cleanliness === 'MEDIUM' ? 'Orta' : 'Düşük'}
                        </p>
                    </div>
                    ` : ''}
                    
                    <div class="bg-slate-50 rounded-lg p-4">
                        <p class="text-sm text-slate-600 mb-1">Tercihler</p>
                        <div class="flex gap-3 mt-2">
                            ${profileData.smoking_ok ? '<span class="text-xs bg-teal-100 text-teal-700 px-2 py-1 rounded">🚬 Sigara OK</span>' : ''}
                            ${profileData.pet_ok ? '<span class="text-xs bg-teal-100 text-teal-700 px-2 py-1 rounded">🐾 Evcil Hayvan OK</span>' : ''}
                            ${!profileData.smoking_ok && !profileData.pet_ok ? '<span class="text-xs text-slate-500">Belirtilmemiş</span>' : ''}
                        </div>
                    </div>
                </div>
            </div>
            ` : ''}
            
            ${ratingsData.ratings.length > 0 ? `
            <div class="mb-6">
                <h2 class="text-xl font-semibold text-slate-900 mb-3">Değerlendirmeler</h2>
                <div class="space-y-4">
                    ${ratingsData.ratings.map(rating => `
                        <div class="bg-slate-50 rounded-lg p-4">
                            <div class="flex items-start gap-3">
                                <img src="${rating.rater_photo || '/static/images/default-avatar.svg'}" 
                                     class="w-10 h-10 rounded-full object-cover"
                                     onerror="this.src='/static/images/default-avatar.svg'" />
                                <div class="flex-1">
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="font-semibold text-slate-900">${escapeHtml(rating.rater_name)}</span>
                                        <div class="flex">${renderStars(rating.rating, 'text-sm')}</div>
                                    </div>
                                    ${rating.comment ? `<p class="text-sm text-slate-700">${escapeHtml(rating.comment)}</p>` : ''}
                                    <p class="text-xs text-slate-500 mt-1">${new Date(rating.created_at).toLocaleDateString('tr-TR')}</p>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
            ` : ''}
            
            ${token ? `
            <div class="mt-8 flex gap-4">
                <button onclick="startConversation('${userId}')" class="flex-1 bg-gradient-to-r from-teal-700 to-teal-600 hover:from-teal-800 hover:to-teal-700 text-white py-3 rounded-lg font-semibold transition-all">
                    💬 Mesaj Gönder
                </button>
                <button onclick="window.history.back()" class="px-6 bg-slate-200 hover:bg-slate-300 text-slate-700 py-3 rounded-lg font-semibold transition-all">
                    ← Geri Dön
                </button>
            </div>
            ` : `
            <div class="mt-8 text-center">
                <p class="text-slate-600 mb-4">Mesaj göndermek için giriş yapın</p>
                <a href="/login" class="inline-block bg-gradient-to-r from-teal-700 to-teal-600 hover:from-teal-800 hover:to-teal-700 text-white px-8 py-3 rounded-lg font-semibold transition-all">
                    Giriş Yap
                </a>
            </div>
            `}
        `;
        
    } catch (error) {
        console.error('Error loading profile:', error);
        container.innerHTML = `
            <div class="text-center py-12">
                <div class="text-6xl mb-4">😕</div>
                <h2 class="text-2xl font-bold text-slate-900 mb-2">Profil Bulunamadı</h2>
                <p class="text-slate-600 mb-6">${error.message}</p>
                <button onclick="window.history.back()" class="bg-teal-700 hover:bg-teal-800 text-white px-6 py-3 rounded-lg font-semibold transition-all">
                    ← Geri Dön
                </button>
            </div>
        `;
    }
}

function showRatingModal(userId) {
    const modal = document.createElement('div');
    modal.id = 'ratingModal';
    modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
    modal.innerHTML = `
        <div class="bg-white rounded-xl p-6 max-w-md w-full">
            <h3 class="text-xl font-bold text-slate-900 mb-4">Kullanıcıyı Değerlendir</h3>
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Puan</label>
                <div class="flex gap-2" id="starRating">
                    ${[1,2,3,4,5].map(i => `
                        <button onclick="selectRating(${i})" class="text-4xl text-gray-300 hover:text-yellow-400 transition-colors" data-rating="${i}">★</button>
                    `).join('')}
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold text-slate-700 mb-2">Yorum (İsteğe bağlı)</label>
                <textarea id="ratingComment" class="w-full rounded-lg border-slate-200 focus:border-teal-600 focus:ring-teal-600" rows="3" placeholder="Deneyiminizi paylaşın..."></textarea>
            </div>
            <div class="flex gap-3">
                <button onclick="closeRatingModal()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 py-2 rounded-lg font-semibold transition-all">
                    İptal
                </button>
                <button onclick="submitRating('${userId}')" class="flex-1 bg-gradient-to-r from-teal-700 to-teal-600 hover:from-teal-800 hover:to-teal-700 text-white py-2 rounded-lg font-semibold transition-all">
                    Gönder
                </button>
            </div>
        </div>
    `;
    document.body.appendChild(modal);
}

let selectedRating = 0;

function selectRating(rating) {
    selectedRating = rating;
    const stars = document.querySelectorAll('#starRating button');
    stars.forEach((star, index) => {
        if (index < rating) {
            star.classList.remove('text-gray-300');
            star.classList.add('text-yellow-400');
        } else {
            star.classList.remove('text-yellow-400');
            star.classList.add('text-gray-300');
        }
    });
}

function closeRatingModal() {
    const modal = document.getElementById('ratingModal');
    if (modal) modal.remove();
    selectedRating = 0;
}

async function submitRating(userId) {
    if (selectedRating === 0) {
        showToast('Lütfen bir puan seçin', 'warning');
        return;
    }
    
    const comment = document.getElementById('ratingComment').value;
    
    try {
        const response = await fetch('/api/ratings', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                rated_id: userId,
                rating: selectedRating,
                comment: comment
            })
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.detail || 'Rating gönderilemedi');
        }
        
        closeRatingModal();
        showToast('Değerlendirmeniz kaydedildi!', 'success');
        loadUserProfile(); // Reload to show new rating
        
    } catch (error) {
        showToast(error.message, 'error');
    }
}

loadUserProfile();
</script>
<script src="/static/js/mobile-menu.js"></script>
</body></html>
