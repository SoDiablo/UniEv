<!DOCTYPE html>
<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>

        <span class="text-sm font-semibold text-red-700">Kayıt ediliyor...</span>

        <button onclick="cancelRecording()" class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 py-2 rounded-lg transition-all">İptal</button>

<!-- Upload Progress -->

        <span class="text-sm text-blue-700">Yükleniyor...</span>

</div>

<div class="flex gap-2">
<!-- Attachment Button -->
<div class="relative">
    <button onclick="toggleAttachmentMenu()" id="attachmentBtn" class="p-2 text-slate-500 hover:text-teal-600 hover:bg-slate-100 rounded-lg transition-all">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path>
        </svg>
    </button>
    <div id="attachmentMenu" class="hidden absolute bottom-full left-0 mb-2 bg-white border border-slate-200 rounded-lg shadow-lg overflow-hidden">
        <button onclick="selectPhoto()" class="w-full px-4 py-3 text-left hover:bg-slate-50 flex items-center gap-3 text-sm">
            <span class="text-xl">📷</span>
            <span>Fotoğraf</span>
        </button>
        <button onclick="selectVideo()" class="w-full px-4 py-3 text-left hover:bg-slate-50 flex items-center gap-3 text-sm border-t border-slate-100">
            <span class="text-xl">🎥</span>
            <span>Video</span>

        <button onclick="startVoiceRecording()" class="w-full px-4 py-3 text-left hover:bg-slate-50 flex items-center gap-3 text-sm border-t border-slate-100">
            <span class="text-xl">🎤</span>

        </button>
    </div>
</div>

<input type="text" id="messageInput" class="flex-1 rounded-lg border-slate-200 focus:border-teal-600 focus:ring-teal-600" placeholder="Mesajınızı yazın..." onkeypress="if(event.key==='Enter') sendMessage()"/>
<button onclick="sendMessage()" class="bg-gradient-to-r from-teal-700 to-teal-600 hover:from-teal-800 hover:to-teal-700 text-white px-6 py-2 rounded-lg transition-all">Gönder</button>

<div>© 2026 UniEv - Öğrenciler için güvenli konut platformu</div>
<nav class="flex flex-wrap justify-center gap-4">
<a class="hover:text-teal-200 transition-colors" href="#">KVKK</a>
<a class="hover:text-teal-200 transition-colors" href="#">Gizlilik</a>
<a class="hover:text-teal-200 transition-colors" href="#">Çerez Politikası</a>
<a class="hover:text-teal-200 transition-colors" href="#">Kullanım Koşulları</a>
<a class="hover:text-teal-200 transition-colors" href="/help">Yardım</a>
</nav>
</div>

<script>
// Global variables
let currentChatUserId = null;
let currentChatUserPhoto = '';
let conversations = [];
let mediaRecorder = null;
let audioChunks = [];
let recordingStartTime = null;
let recordingInterval = null;
let pendingMediaFile = null;
let pendingMediaType = null;

// Check authentication
const token = localStorage.getItem('token');
if (!token) {
    window.location.href = '/login';
}

const userStr = localStorage.getItem('user');
const user = userStr ? JSON.parse(userStr) : null;

// Dynamic navigation with unread count
async function setupNavigation() {
    const nav = document.getElementById('mainNav');
    const activeClass = 'text-teal-700 border-b-2 border-teal-700 pb-1 relative';
    const normalClass = 'hover:text-slate-900 relative';
    
    // Get unread count
    let unreadCount = 0;
    try {
        const response = await fetch('/api/messages/unread-count', {
            headers: {'Authorization': `Bearer ${token}`}
        });
        if (response.ok) {
            const data = await response.json();
            unreadCount = data.unread_count;
        }
    } catch (error) {
        console.error('Error fetching unread count:', error);
    }
    
    const unreadDot = unreadCount > 0 ? '<span class="notification-dot"></span>' : '';
    
    if (!user) {
        nav.innerHTML = `
            <a class="${normalClass}" href="/">Ana Sayfa</a>
            <a class="${normalClass}" href="/listings">İlanlar</a>
            <a class="${normalClass}" href="/help">Yardım</a>
            <a class="${normalClass}" href="/login">Giriş</a>
            <a class="${normalClass}" href="/register">Kayıt Ol</a>
        `;
        return;
    }
    
    if (user.role === 'LANDLORD') {
        nav.innerHTML = `
            <a class="${normalClass}" href="/">Ana Sayfa</a>
            <a class="${normalClass}" href="/listings">İlanlar</a>
            <a class="${normalClass}" href="/create-listing">İlan Oluştur</a>
            <a class="${activeClass}" href="/messages">Mesajlar${unreadDot}</a>
            <a class="${normalClass}" href="/profile">Profil</a>
            <a class="${normalClass}" href="/help">Yardım</a>
            <a class="${normalClass}" href="#" onclick="logout()">Çıkış</a>
        `;
    } else if (user.role === 'ADMIN') {
        nav.innerHTML = `
            <a class="${normalClass}" href="/">Ana Sayfa</a>
            <a class="${normalClass}" href="/listings">İlanlar</a>
            <a class="${normalClass}" href="/admin">Admin Panel</a>
            <a class="${activeClass}" href="/messages">Mesajlar${unreadDot}</a>
            <a class="${normalClass}" href="/profile">Profil</a>
            <a class="${normalClass}" href="/help">Yardım</a>
            <a class="${normalClass}" href="#" onclick="logout()">Çıkış</a>
        `;
    } else {
        // STUDENT
        nav.innerHTML = `
            <a class="${normalClass}" href="/">Ana Sayfa</a>
            <a class="${normalClass}" href="/listings">İlanlar</a>
            <a class="${normalClass}" href="/match">Eşleşme</a>
            <a class="${activeClass}" href="/messages">Mesajlar${unreadDot}</a>
            <a class="${normalClass}" href="/profile">Profil</a>
            <a class="${normalClass}" href="/help">Yardım</a>
            <a class="${normalClass}" href="#" onclick="logout()">Çıkış</a>
        `;
    }
}

setupNavigation();

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/login';
}

async function loadConversations() {
    const container = document.getElementById('conversations');
    
    try {
        const response = await fetch('/api/messages/conversations', {
            headers: {'Authorization': `Bearer ${token}`}
        });
        
        if (response.status === 401) {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
            return;
        }
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        conversations = data.conversations || [];
        
        if (conversations.length > 0) {
            container.innerHTML = conversations.map(conv => `
                <div class="p-3 md:p-4 hover:bg-slate-50 cursor-pointer border-b border-slate-100 transition-colors ${currentChatUserId === conv.id ? 'bg-teal-50' : ''}" onclick="loadMessages('${conv.id}', '${escapeHtml(conv.name)}', '${conv.photo_url || ''}')">
                    <div class="flex items-center gap-2 md:gap-3">
                        <img src="${conv.photo_url || '/static/images/default-avatar.svg'}" 
                             alt="Profile" 
                             class="w-10 h-10 md:w-12 md:h-12 rounded-full object-cover border-2 border-slate-200 hover:border-teal-500 transition-colors flex-shrink-0"
                             onerror="this.src='/static/images/default-avatar.svg'"
                             onclick="event.stopPropagation(); window.location.href='/user/${conv.id}'" />
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start gap-2">
                                <div class="font-semibold text-sm md:text-base text-slate-900 truncate">${escapeHtml(conv.name)}</div>
                                ${conv.unread_count > 0 ? `<span class="bg-red-500 text-white text-xs rounded-full px-2 py-0.5 md:py-1 flex-shrink-0">${conv.unread_count}</span>` : ''}
                            </div>
                            ${conv.last_message ? `<div class="text-xs md:text-sm text-slate-500 truncate mt-1">${escapeHtml(conv.last_message)}</div>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        } else {
            container.innerHTML = `
                <div class="p-8 text-center text-slate-500">
                    <div class="text-4xl mb-4">📭</div>
                    <p class="text-sm">Henüz mesajınız yok</p>
                    <p class="text-xs mt-2 text-slate-400">Bir ilanla ilgilendiğinizde ev sahibiyle mesajlaşabilirsiniz</p>
                </div>
            `;
        }
    } catch (error) {
        console.error('Error loading conversations:', error);
        container.innerHTML = `
            <div class="p-4 text-center text-red-500">
                <p class="font-semibold mb-2">Hata</p>
                <p class="text-sm">Konuşmalar yüklenemedi</p>
                <button onclick="loadConversations()" class="mt-2 text-xs bg-red-100 px-3 py-1 rounded hover:bg-red-200">
                    Tekrar Dene
                </button>
            </div>
        `;
    }
}

async function loadMessages(userId, userName, userPhoto = '') {
    currentChatUserId = userId;
    currentChatUserPhoto = userPhoto;
    
    // Update UI with clickable header
    document.getElementById('chat-header').classList.remove('hidden');
    const headerHTML = `
        <div class="flex items-center gap-2 md:gap-3 cursor-pointer hover:bg-slate-100 p-2 rounded-lg transition-colors" onclick="viewUserProfile('${userId}')">
            <img src="${userPhoto || '/static/images/default-avatar.svg'}" 
                 alt="Profile" 
                 class="w-8 h-8 md:w-10 md:h-10 rounded-full object-cover border-2 border-slate-200 flex-shrink-0"
                 onerror="this.src='/static/images/default-avatar.svg'" />
            <h3 class="font-semibold text-base md:text-lg truncate">${escapeHtml(userName)}</h3>
        </div>
    `;
    document.getElementById('chat-header').innerHTML = headerHTML;
    document.getElementById('message-input-area').classList.remove('hidden');
    
    // Highlight selected conversation
    loadConversations();
    
    const container = document.getElementById('messages');
    container.innerHTML = '<div class="text-center text-slate-400"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-teal-700 mx-auto"></div></div>';
    
    try {
        const response = await fetch(`/api/messages?other_user_id=${userId}`, {
            headers: {'Authorization': `Bearer ${token}`}
        });
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        const messages = data.messages || [];
        
        if (messages.length > 0) {
            container.innerHTML = messages.map(msg => {
                let content = '';
                
                if (msg.message_type === 'TEXT' || !msg.message_type) {
                    content = `<p class="text-sm break-words">${escapeHtml(msg.content || '')}</p>`;
                } else if (msg.message_type === 'IMAGE') {
                    content = `
                        <img src="${msg.file_url}" 
                             alt="Image" 
                             class="max-w-xs rounded-lg cursor-pointer hover:opacity-90 transition-opacity"
                             onclick="openImageModal('${msg.file_url}')" />
                        ${msg.content ? `<p class="text-sm mt-2 break-words">${escapeHtml(msg.content)}</p>` : ''}
                    `;
                } else if (msg.message_type === 'VIDEO') {
                    content = `
                        <video src="${msg.file_url}" 
                               controls 
                               class="max-w-xs rounded-lg">
                        </video>
                        ${msg.content ? `<p class="text-sm mt-2 break-words">${escapeHtml(msg.content)}</p>` : ''}
                    `;
                } else if (msg.message_type === 'AUDIO') {
                    const audioId = `audio-${msg.id}`;
                    content = `
                        <div class="flex items-center gap-3 ${msg.is_mine ? 'bg-teal-600' : 'bg-slate-100'} rounded-lg p-3 min-w-[250px]">
                            <button onclick="toggleAudio('${audioId}', '${msg.file_url}')" id="play-btn-${audioId}" class="flex-shrink-0 w-10 h-10 rounded-full ${msg.is_mine ? 'bg-teal-500 hover:bg-teal-400' : 'bg-teal-600 hover:bg-teal-700'} flex items-center justify-center transition-all">
                                <svg class="w-5 h-5 text-white ml-0.5" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                            </button>
                            <div class="flex-1 flex flex-col gap-1">
                                <div class="h-1 ${msg.is_mine ? 'bg-teal-500' : 'bg-slate-300'} rounded-full overflow-hidden">
                                    <div id="progress-${audioId}" class="h-full ${msg.is_mine ? 'bg-white' : 'bg-teal-600'} rounded-full transition-all" style="width: 0%"></div>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-xs ${msg.is_mine ? 'text-teal-100' : 'text-slate-600'}" id="time-${audioId}">0:00</span>
                                    <span class="text-xs ${msg.is_mine ? 'text-teal-100' : 'text-slate-600'}">${formatDuration(msg.duration)}</span>
                                </div>
                            </div>
                            <audio id="${audioId}" src="${msg.file_url}" preload="metadata"></audio>
                        </div>
                        ${msg.content ? `<p class="text-sm mt-2 break-words">${escapeHtml(msg.content)}</p>` : ''}
                    `;
                }
                
                return `
                    <div class="mb-4 flex ${msg.is_mine ? 'justify-end' : 'justify-start'}">
                        <div class="max-w-[70%] ${msg.is_mine ? 'bg-teal-600 text-white' : 'bg-slate-100 text-slate-900'} rounded-lg px-4 py-2">
                            ${content}
                            <p class="text-xs ${msg.is_mine ? 'text-teal-100' : 'text-slate-500'} mt-1">
                                ${new Date(msg.created_at).toLocaleTimeString('tr-TR', {hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Istanbul'})}
                            </p>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        } else {
            container.innerHTML = `
                <div class="flex items-center justify-center h-full text-slate-400">
                    <div class="text-center">
                        <div class="text-6xl mb-4">👋</div>
                        <p class="text-lg">Henüz mesaj yok</p>
                        <p class="text-sm mt-2">İlk mesajı göndererek konuşmayı başlatın</p>
                    </div>
                </div>
            `;
        }
        
        // Update navigation to remove red dot
        setupNavigation();
        
    } catch (error) {
        console.error('Error loading messages:', error);
        container.innerHTML = `
            <div class="text-center text-red-500 p-4">
                <p class="font-semibold mb-2">Hata</p>
                <p class="text-sm">Mesajlar yüklenemedi</p>
            </div>
        `;
    }
}

// View user profile function
function viewUserProfile(userId) {
    window.location.href = `/user/${userId}`;
}

async function sendMessage() {
    if (!currentChatUserId) {
        showToast('Lütfen önce bir konuşma seçin', 'warning');
        return;
    }
    
    const input = document.getElementById('messageInput');
    const content = input.value.trim();
    
    if (!content) {
        return;
    }
    
    try {
        const response = await fetch('/api/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                receiver_id: currentChatUserId,
                content: content
            })
        });
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        // Clear input
        input.value = '';
        
        // Reload messages
        const userName = document.getElementById('chat-header').querySelector('h3').textContent;
        await loadMessages(currentChatUserId, userName, currentChatUserPhoto);
        
        // Reload conversations to update last message
        await loadConversations();
        
    } catch (error) {
        console.error('Error sending message:', error);
        showToast('Mesaj gönderilemedi. Lütfen tekrar deneyin.', 'error');
    }
}

// Check URL parameters for direct conversation
const urlParams = new URLSearchParams(window.location.search);
const withUserId = urlParams.get('with');

// Load conversations first
loadConversations().then(() => {
    // If there's a 'with' parameter, open that conversation
    if (withUserId) {
        // Find the conversation
        const conv = conversations.find(c => c.id === withUserId);
        if (conv) {
            loadMessages(withUserId, conv.name, conv.photo_url);
        } else {
            // Conversation doesn't exist yet, fetch user info and create it
            fetch(`/api/users/${withUserId}`, {
                headers: {'Authorization': `Bearer ${token}`}
            })
            .then(r => r.json())
            .then(userData => {
                const userName = `${userData.first_name} ${userData.last_name}`;
                loadMessages(withUserId, userName, '');
            })
            .catch(err => {
                console.error('Error fetching user:', err);
                showToast('Kullanıcı bulunamadı', 'error');
            });
        }
    }
});

// Refresh unread count every 30 seconds
setInterval(() => {
    setupNavigation();
}, 30000);

// ============================================
// MEDIA MESSAGING FUNCTIONS
// ============================================

// Toggle attachment menu
function toggleAttachmentMenu() {
    const menu = document.getElementById('attachmentMenu');
    menu.classList.toggle('hidden');
}

// Close attachment menu when clicking outside
document.addEventListener('click', (e) => {
    const menu = document.getElementById('attachmentMenu');
    const btn = document.getElementById('attachmentBtn');
    if (!menu.contains(e.target) && !btn.contains(e.target)) {
        menu.classList.add('hidden');
    }
});

// Photo selection
function selectPhoto() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (file) {
            await previewAndUploadImage(file);
        }
    };
    input.click();
    document.getElementById('attachmentMenu').classList.add('hidden');
}

// Video selection
function selectVideo() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'video/*';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (file) {
            await previewAndUploadVideo(file);
        }
    };
    input.click();
    document.getElementById('attachmentMenu').classList.add('hidden');
}

// Preview and upload image
async function previewAndUploadImage(file) {
    // Show preview
    const reader = new FileReader();
    reader.onload = (e) => {
        document.getElementById('previewContent').innerHTML = `
            <img src="${e.target.result}" class="max-w-full max-h-64 rounded-lg mx-auto" />

        `;
        document.getElementById('filePreview').classList.remove('hidden');
    };
    reader.readAsDataURL(file);
    
    pendingMediaFile = file;
    pendingMediaType = 'IMAGE';
}

// Confirm and send media
async function confirmSendMedia() {
    console.log('confirmSendMedia called');
    console.log('pendingMediaFile:', pendingMediaFile);
    console.log('currentChatUserId:', currentChatUserId);
    console.log('pendingMediaType:', pendingMediaType);
    
    if (!pendingMediaFile) {
        showToast('Dosya bulunamadı', 'error');
        return;
    }
    
    if (!currentChatUserId) {
        showToast('Alıcı seçilmedi', 'error');
        return;
    }
    
    if (!token) {
        showToast('Oturum süresi dolmuş, lütfen tekrar giriş yapın', 'error');
        window.location.href = '/login';
        return;
    }
    
    // Hide preview, show progress
    document.getElementById('filePreview').classList.add('hidden');
    document.getElementById('uploadProgress').classList.remove('hidden');
    
    try {
        const formData = new FormData();
        formData.append('file', pendingMediaFile);
        
        const endpoint = pendingMediaType === 'IMAGE' ? '/api/upload/image' : '/api/upload/video';
        
        console.log('Uploading to:', endpoint);
        console.log('File:', pendingMediaFile.name, pendingMediaFile.size, 'bytes');
        console.log('Token exists:', !!token);
        
        const uploadResponse = await fetch(endpoint, {
            method: 'POST',
            headers: {'Authorization': `Bearer ${token}`},
            body: formData
        });
        
        console.log('Upload response status:', uploadResponse.status);
        
        if (!uploadResponse.ok) {
            const errorData = await uploadResponse.json();
            console.error('Upload error:', errorData);
            throw new Error(errorData.detail || 'Upload failed');
        }
        
        const uploadData = await uploadResponse.json();
        console.log('Upload successful:', uploadData);
        
        // Send message
        const messageResponse = await fetch('/api/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                receiver_id: currentChatUserId,
                message_type: pendingMediaType,
                file_url: uploadData.url,
                file_name: uploadData.filename,
                content: ""  // Send empty string instead of undefined
            })
        });
        
        console.log('Message response status:', messageResponse.status);
        
        if (!messageResponse.ok) {
            const errorData = await messageResponse.json();
            console.error('Message error:', errorData);
            throw new Error(errorData.detail || 'Message send failed');
        }
        
        showToast('Dosya gönderildi', 'success');
        
        // Reload messages
        const userName = document.getElementById('chat-header').querySelector('h3').textContent;
        await loadMessages(currentChatUserId, userName, currentChatUserPhoto);
        await loadConversations();
        
    } catch (error) {
        console.error('Error sending media:', error);
        showToast('Dosya gönderilemedi: ' + error.message, 'error');
    } finally {
        document.getElementById('uploadProgress').classList.add('hidden');
        pendingMediaFile = null;
        pendingMediaType = null;
    }
}

// Cancel upload
function cancelUpload() {
    document.getElementById('filePreview').classList.add('hidden');
    pendingMediaFile = null;
    pendingMediaType = null;
}

// Voice recording
async function startVoiceRecording() {
    document.getElementById('attachmentMenu').classList.add('hidden');
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        recordingStartTime = Date.now();
        
        mediaRecorder.ondataavailable = (event) => {
            audioChunks.push(event.data);
        };
        
        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const duration = Math.floor((Date.now() - recordingStartTime) / 1000);
            await uploadAndSendAudio(audioBlob, duration);
            
            // Stop all tracks
            stream.getTracks().forEach(track => track.stop());
        };
        
        mediaRecorder.start();
        document.getElementById('recordingUI').classList.remove('hidden');
        
        // Update duration display
        recordingInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('recordingDuration').textContent = 
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }, 1000);
        
    } catch (error) {
        console.error('Microphone access error:', error);
        showToast('Mikrofon erişimi reddedildi. Lütfen tarayıcı ayarlarından mikrofon iznini kontrol edin.', 'error');
    }
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        clearInterval(recordingInterval);
        document.getElementById('recordingUI').classList.add('hidden');
    }
}

function cancelRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        if (mediaRecorder.stream) {
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
        }
    }
    clearInterval(recordingInterval);
    document.getElementById('recordingUI').classList.add('hidden');
    audioChunks = [];
}

async function uploadAndSendAudio(audioBlob, duration) {
    document.getElementById('uploadProgress').classList.remove('hidden');
    
    try {
        const formData = new FormData();
        formData.append('file', audioBlob, 'voice-message.webm');
        
        const uploadResponse = await fetch('/api/upload/audio', {
            method: 'POST',
            headers: {'Authorization': `Bearer ${token}`},
            body: formData
        });
        
        if (!uploadResponse.ok) {
            throw new Error('Upload failed');
        }
        
        const uploadData = await uploadResponse.json();
        
        // Send message
        const messageResponse = await fetch('/api/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                receiver_id: currentChatUserId,
                message_type: 'AUDIO',
                file_url: uploadData.url,
                file_name: uploadData.filename,
                duration: duration,
                content: ""  // Send empty string instead of undefined
            })
        });
        
        if (!messageResponse.ok) {
            throw new Error('Message send failed');
        }
        
        // Reload messages
        const userName = document.getElementById('chat-header').querySelector('h3').textContent;
        await loadMessages(currentChatUserId, userName, currentChatUserPhoto);
        await loadConversations();
        
    } catch (error) {
        console.error('Error sending audio:', error);
        showToast('Ses kaydı gönderilemedi: ' + error.message, 'error');
    } finally {
        document.getElementById('uploadProgress').classList.add('hidden');
    }
}

// Format duration for display
function formatDuration(seconds) {
    if (!seconds) return '0:00';
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins}:${secs.toString().padStart(2, '0')}`;
}

// Escape HTML
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Open image modal
function openImageModal(url) {
    const modal = document.createElement('div');
    modal.className = 'fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50';
    modal.onclick = () => modal.remove();
    modal.innerHTML = `
        <img src="${url}" class="max-w-[90%] max-h-[90%] rounded-lg" />
    `;
    document.body.appendChild(modal);
}

// Play audio function with progress tracking
let currentAudio = null;
let currentAudioId = null;

function toggleAudio(audioId, url) {
    const audio = document.getElementById(audioId);
    const playBtn = document.getElementById(`play-btn-${audioId}`);
    const progressBar = document.getElementById(`progress-${audioId}`);
    const timeDisplay = document.getElementById(`time-${audioId}`);
    
    // If another audio is playing, stop it
    if (currentAudio && currentAudioId !== audioId) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        const oldBtn = document.getElementById(`play-btn-${currentAudioId}`);
        if (oldBtn) {
            oldBtn.innerHTML = `
                <svg class="w-5 h-5 text-white ml-0.5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            `;
        }
    }
    
    if (audio.paused) {
        // Play
        audio.play().then(() => {
            currentAudio = audio;
            currentAudioId = audioId;
            
            // Change to pause icon
            playBtn.innerHTML = `
                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
                </svg>
            `;
            
            // Update progress
            audio.ontimeupdate = () => {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = `${progress}%`;
                timeDisplay.textContent = formatDuration(Math.floor(audio.currentTime));
            };
            
            // Reset when ended
            audio.onended = () => {
                playBtn.innerHTML = `
                    <svg class="w-5 h-5 text-white ml-0.5" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                `;
                progressBar.style.width = '0%';
                timeDisplay.textContent = '0:00';
                currentAudio = null;
                currentAudioId = null;
            };
        }).catch(error => {
            console.error('Error playing audio:', error);
            showToast('Ses dosyası çalınamadı', 'error');
        });
    } else {
        // Pause
        audio.pause();
        playBtn.innerHTML = `
            <svg class="w-5 h-5 text-white ml-0.5" fill="currentColor" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z"/>
            </svg>
        `;
        currentAudio = null;
        currentAudioId = null;
    }
}
