<!DOCTYPE html>
<html class="light" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>UniEv - İlanlar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            background-color: #F8FAFA;
        }
        .navbar-gradient {
            background: linear-gradient(90deg, #0f766e 0%, #14b8a6 50%, #0f766e 100%);
            height: 3px;
        }
    </style>
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body class="bg-slate-50 text-on-background font-body-md selection:bg-secondary-container min-h-screen flex flex-col">
<header class="fixed top-0 w-full bg-white border-b border-slate-200 shadow-sm z-50">
<div class="max-w-7xl mx-auto flex justify-between items-center h-20 px-6">
<div class="flex items-center gap-2">
<a href="/">
<img alt="UniEv Logo" class="h-30 w-30 object-contain" src="/static/images/Logo.png" onerror="this.style.display='none'"/>
</a>
</div>
<nav class="hidden md:flex items-center space-x-8" id="mainNav">
<!-- Navigation will be dynamically populated -->
</nav>
<!-- Mobile menu button will be added by mobile-menu.js -->
</div>
<!-- Gradient Line -->
<div class="navbar-gradient"></div>
</header>
<main class="pt-20 flex-grow">
<div class="max-w-7xl mx-auto px-6 py-8">
<section class="bg-white border border-[#ECEFF1] rounded-xl p-8 mb-8 shadow-[0px_4px_20px_rgba(0,121,107,0.05)]">
<h1 class="font-headline-lg text-on-background mb-8">İlanları Keşfet</h1>
<div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-gutter items-end">
<div class="flex flex-col space-y-2">
<label class="font-label-md text-on-surface-variant">Şehir</label>
<input class="w-full px-4 h-12 border-[#CFD8DC] rounded-lg focus:ring-primary focus:border-primary text-body-md" placeholder="Şehir seçin" type="text" id="city" onkeypress="if(event.key==='Enter') searchListings()"/>
</div>
<div class="flex flex-col space-y-2">
<label class="font-label-md text-on-surface-variant">Min fiyat (₺)</label>
<input class="w-full px-4 h-12 border-[#CFD8DC] rounded-lg focus:ring-primary focus:border-primary text-body-md" placeholder="0" type="number" id="min_price" onkeypress="if(event.key==='Enter') searchListings()"/>
</div>
<div class="flex flex-col space-y-2">
<label class="font-label-md text-on-surface-variant">Max fiyat (₺)</label>
<input class="w-full px-4 h-12 border-[#CFD8DC] rounded-lg focus:ring-primary focus:border-primary text-body-md" placeholder="10.000" type="number" id="max_price" onkeypress="if(event.key==='Enter') searchListings()"/>
</div>
<div class="flex flex-col space-y-2">
<label class="font-label-md text-on-surface-variant">Max risk (0-100)</label>
<input class="w-full px-4 h-12 border-[#CFD8DC] rounded-lg focus:ring-primary focus:border-primary text-body-md" placeholder="50" type="number" id="max_fraud_score" onkeypress="if(event.key==='Enter') searchListings()"/>
</div>
<div class="flex flex-col space-y-2">
<label class="font-label-md text-on-surface-variant">Min güvenlik (0-100)</label>
<input class="w-full px-4 h-12 border-[#CFD8DC] rounded-lg focus:ring-primary focus:border-primary text-body-md" placeholder="80" type="number" id="min_safety_index" onkeypress="if(event.key==='Enter') searchListings()"/>
</div>
<div>
<button class="w-full h-12 bg-gradient-to-r from-teal-800 to-teal-700 hover:from-teal-700 hover:to-teal-600 text-white font-label-md rounded-lg flex items-center justify-center transition-all duration-200" type="button" id="searchButton">
<span class="material-symbols-outlined mr-2">search</span>
                            Ara
                        </button>
</div>
</div>
</section>
<div id="listings-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
</div>
</div>
</main>
<footer class="w-full py-8 mt-auto bg-gradient-to-r from-teal-800 to-teal-700 border-t border-teal-900">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center px-6 space-y-4 md:space-y-0">
<div class="font-manrope text-xs text-white">
                © 2026 UniEv University Housing
            </div>
<div class="flex flex-wrap justify-center gap-x-6 gap-y-2">
<a class="font-manrope text-xs text-white hover:text-teal-200 underline transition-colors duration-200" href="#">KVKK</a>
<a class="font-manrope text-xs text-white hover:text-teal-200 underline transition-colors duration-200" href="#">Gizlilik</a>
<a class="font-manrope text-xs text-white hover:text-teal-200 underline transition-colors duration-200" href="#">Çerez Politikası</a>
<a class="font-manrope text-xs text-white hover:text-teal-200 underline transition-colors duration-200" href="#">Kullanım Koşulları</a>
<a class="font-manrope text-xs text-white hover:text-teal-200 underline transition-colors duration-200" href="#">Yardım</a>
</div>
</div>
</footer>
<script>
// Check authentication on page load
const token = localStorage.getItem('token');
const userStr = localStorage.getItem('user');
const user = userStr ? JSON.parse(userStr) : null;

console.log('Listings page loaded');
console.log('User:', user);
console.log('Token exists:', !!token);

// Dynamic navigation based on role
function setupNavigation() {
    const nav = document.getElementById('mainNav');
    const activeClass = 'font-manrope text-sm font-medium text-teal-700 border-b-2 border-teal-700 pb-1 cursor-pointer transition-all duration-200';
    const normalClass = 'font-manrope text-sm font-medium text-slate-600 hover:text-teal-600 transition-colors cursor-pointer transition-all duration-200';
    
    if (!user) {
        nav.innerHTML = `
            <a class="${normalClass}" href="/">Ana Sayfa</a>
            <a class="${activeClass}" href="/listings">İlanlar</a>
            <a class="${normalClass}" href="/help">Yardım</a>
            <a class="${normalClass}" href="/login">Giriş</a>
            <a class="${normalClass}" href="/register">Kayıt Ol</a>
        `;
        return;
    }
    
    if (user.role === 'LANDLORD') {
        nav.innerHTML = `
            <a class="${normalClass}" href="/">Ana Sayfa</a>
            <a class="${activeClass}" href="/listings">İlanlar</a>
            <a class="${normalClass}" href="/create-listing">İlan Oluştur</a>
            <a class="${normalClass}" href="/messages">Mesajlar</a>
            <a class="${normalClass}" href="/profile">Profil</a>
            <a class="${normalClass}" href="/help">Yardım</a>
            <a class="${normalClass}" href="#" onclick="logout()">Çıkış</a>
        `;
    } else if (user.role === 'ADMIN') {
        nav.innerHTML = `
            <a class="${normalClass}" href="/">Ana Sayfa</a>
            <a class="${activeClass}" href="/listings">İlanlar</a>
            <a class="${normalClass}" href="/admin">Admin Panel</a>
            <a class="${normalClass}" href="/messages">Mesajlar</a>
            <a class="${normalClass}" href="/profile">Profil</a>
            <a class="${normalClass}" href="/help">Yardım</a>
            <a class="${normalClass}" href="#" onclick="logout()">Çıkış</a>
        `;
    } else {
        // STUDENT
        nav.innerHTML = `
            <a class="${normalClass}" href="/">Ana Sayfa</a>
            <a class="${activeClass}" href="/listings">İlanlar</a>
            <a class="${normalClass}" href="/match">Eşleşme</a>
            <a class="${normalClass}" href="/messages">Mesajlar</a>
            <a class="${normalClass}" href="/profile">Profil</a>
            <a class="${normalClass}" href="/help">Yardım</a>
            <a class="${normalClass}" href="#" onclick="logout()">Çıkış</a>
        `;
    }
}

setupNavigation();

function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/login';
}

async function searchListings() {
    console.log('=== SEARCH LISTINGS CALLED ===');
    console.log('Current URL:', window.location.href);
    
    // Show loading state
    const container = document.getElementById('listings-container');
    container.innerHTML = `
        <div class="col-span-full text-center py-20">
            <div class="text-6xl mb-4">⏳</div>
            <p class="text-gray-500 text-lg">İlanlar yükleniyor...</p>
        </div>
    `;
    
    const params = new URLSearchParams();
    const city = document.getElementById('city').value.trim();
    const min_price = document.getElementById('min_price').value.trim();
    const max_price = document.getElementById('max_price').value.trim();
    const max_fraud_score = document.getElementById('max_fraud_score').value.trim();
    const min_safety_index = document.getElementById('min_safety_index').value.trim();
    
    console.log('📝 Form values:');
    console.log('  city:', city || '(empty)');
    console.log('  min_price:', min_price || '(empty)');
    console.log('  max_price:', max_price || '(empty)');
    console.log('  max_fraud_score:', max_fraud_score || '(empty)');
    console.log('  min_safety_index:', min_safety_index || '(empty)');
    
    if (city) params.append('city', city);
    if (min_price) params.append('min_price', min_price);
    if (max_price) params.append('max_price', max_price);
    if (max_fraud_score) params.append('max_fraud_score', max_fraud_score);
    if (min_safety_index) params.append('min_safety_index', min_safety_index);
    
    const queryString = params.toString();
    const apiUrl = `/api/listings${queryString ? '?' + queryString : ''}`;
    console.log('🌐 API URL:', apiUrl);
    console.log('📊 Has filters:', queryString.length > 0);
    
    try {
        const response = await fetch(apiUrl);
        console.log('✅ Response status:', response.status);
        
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        console.log('📦 API Response:');
        console.log('  Total:', data.total);
        console.log('  Listings count:', data.listings ? data.listings.length : 0);
        console.log('  Page:', data.page);
        console.log('  Limit:', data.limit);
        
        const container = document.getElementById('listings-container');
        container.innerHTML = '';
        
        if (data.listings && data.listings.length > 0) {
            console.log(`✅ Rendering ${data.listings.length} listings`);
            data.listings.forEach(listing => {
                // Get cover photo
                let coverPhoto = listing.cover_photo || (listing.photo_urls && listing.photo_urls.length > 0 ? listing.photo_urls[0] : null);
                
                const card = `
                    <div class="bg-white rounded-xl border border-gray-100 overflow-hidden hover:shadow-lg transition-shadow cursor-pointer" onclick="window.location.href='/listing/${listing.id}'">
                        <div class="h-48 bg-gray-200 flex items-center justify-center overflow-hidden">
                            ${coverPhoto ? 
                                `<img src="${coverPhoto}" alt="${listing.title}" class="w-full h-full object-cover" onerror="console.error('IMAGE LOAD FAILED:', this.src); this.parentElement.innerHTML='<span class=\\'text-4xl text-gray-400\\'>🏠</span>'"/>` 
                                : '<span class="text-4xl text-gray-400">🏠</span>'}
                        </div>
                        <div class="p-6">
                            <h3 class="font-bold text-lg mb-2">${listing.title}</h3>
                            <p class="text-gray-600 text-sm mb-4">${listing.city || 'Şehir belirtilmemiş'}, ${listing.district || ''}</p>
                            <div class="flex justify-between items-center">
                                <span class="text-teal-700 font-bold text-xl">₺${listing.price.toLocaleString('tr-TR')}/ay</span>
                                <span class="text-sm ${listing.fraud_score > 50 ? 'text-red-500' : 'text-green-600'}">Risk: ${listing.fraud_score || 'N/A'}</span>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        } else {
            console.log('⚠️ No listings found with current filters');
            container.innerHTML = `
                <div class="col-span-full text-center py-20">
                    <div class="text-6xl mb-4">🏘️</div>
                    <p class="text-gray-500 text-lg mb-2">İlan bulunamadı</p>
                    <p class="text-gray-400 text-sm mb-4">Arama kriterlerinize uygun ilan bulunamadı</p>
                    <button onclick="clearFilters()" class="px-6 py-2 bg-teal-700 text-white rounded-lg hover:bg-teal-600 transition-colors">
                        Filtreleri Temizle
                    </button>
                </div>
            `;
        }
    } catch (error) {
        console.error('❌ Error loading listings:', error);
        const container = document.getElementById('listings-container');
        container.innerHTML = `
            <div class="col-span-full text-center py-20">
                <div class="text-6xl mb-4">⚠️</div>
                <p class="text-red-500 text-lg mb-2">İlanlar yüklenirken hata oluştu</p>
                <p class="text-gray-400 text-sm">${error.message}</p>
                <button onclick="searchListings()" class="mt-4 px-6 py-2 bg-teal-700 text-white rounded-lg hover:bg-teal-600 transition-colors">
                    Tekrar Dene
                </button>
            </div>
        `;
    }
}

// Clear all filters and reload
function clearFilters() {
    console.log('🔄 Clearing all filters and reloading listings...');
    document.getElementById('city').value = '';
    document.getElementById('min_price').value = '';
    document.getElementById('max_price').value = '';
    document.getElementById('max_fraud_score').value = '';
    document.getElementById('min_safety_index').value = '';
    
    // Immediately reload all listings
    searchListings();
}

// Load listings on page load
console.log('📋 Page loaded, initializing...');
console.log('✅ searchListings function is defined:', typeof searchListings);
console.log('✅ clearFilters function is defined:', typeof clearFilters);

// Make functions globally accessible
window.searchListings = searchListings;
window.clearFilters = clearFilters;

// Add event listener to search button
const searchButton = document.getElementById('searchButton');
if (searchButton) {
    console.log('✅ Search button found, adding click listener');
    searchButton.addEventListener('click', function(e) {
        e.preventDefault();
        console.log('🔍 Search button clicked!');
        searchListings();
    });
} else {
    console.error('❌ Search button not found!');
}

// Load all listings on page load
console.log('🚀 Loading all listings...');
searchListings();
</script>
<script src="/static/js/mobile-menu.js"></script>
</body></html>
